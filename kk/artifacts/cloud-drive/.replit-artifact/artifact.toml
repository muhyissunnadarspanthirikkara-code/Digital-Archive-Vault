kind = "web"
previewPath = "/"
title = "SafeDrive"
version = "1.0.0"
id = "artifacts/cloud-drive"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22148

[services.development]
run = "pnpm --filter @workspace/cloud-drive run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cloud-drive", "run", "build" ]
publicDir = "artifacts/cloud-drive/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22148"
BASE_PATH = "/"
